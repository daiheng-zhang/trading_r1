train_grpo:
  mode: "trl"   # trl | mock
  stage: 1
  train_path: "/scratch/10499/daiheng367/trading_r1/artifacts/datasets/grpo_batch.jsonl"
  output_dir: "/scratch/10499/daiheng367/trading_r1/artifacts/models/stage1_grpo"
  model_name_or_path: "/scratch/10499/daiheng367/trading_r1/artifacts/models/stage1_sft"
  # Set to "latest" to initialize GRPO from the newest checkpoint under model_name_or_path,
  # or an explicit path like ".../checkpoint-100".
  load_from_checkpoint: latest

  group_size: 2
  generation_batch_size: 4
  max_completion_length: 512
  clip_eps: 0.2
  kl_beta: 0.03
  invalid_decision_reward: -1.5
  num_train_epochs: 1
  logging_steps: 1
  report_to: ["wandb"]
  run_name: "trading_r1_stage1_grpo"
