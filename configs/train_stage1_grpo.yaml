train_grpo:
  mode: "trl"   # trl | mock
  stage: 1
  train_path: "/scratch/10499/daiheng367/trading_r1/artifacts/datasets/grpo_batch.jsonl"
  output_dir: "/scratch/10499/daiheng367/trading_r1/artifacts/models/stage1_grpo"
  model_name_or_path: "/scratch/10499/daiheng367/trading_r1/artifacts/models/stage1_sft"
  # Set to "latest" to initialize GRPO from the newest checkpoint under model_name_or_path,
  # or an explicit path like ".../checkpoint-100".
  load_from_checkpoint: latest

  group_size: 2
  generation_batch_size: 8
  per_device_train_batch_size: 2
  max_completion_length: 384
  logging_steps: 10
  # Mirror the highest-reward checkpoint into output_dir/best-reward for Stage II SFT warm-start.
  save_steps: 1

  clip_eps: 0.2
  kl_beta: 0.03
  invalid_decision_reward: -1.5
  format_instruction: |
    Return only structured analysis that follows this exact schema.
    Required paired XML tags, each exactly once:
    <fundamentals>...</fundamentals>
    <technical>...</technical>
    <news>...</news>
    <valuation>...</valuation>
    <risk>...</risk>
    <macro>...</macro>
    <conclusion>...</conclusion>

    Rules:
    - Do not write analysis outside the XML blocks.
    - Every opening tag must have a matching closing tag.
    - The response must include <conclusion>...</conclusion>.
    - The final line must be exactly one of:
      DECISION: [[[HOLD]]]
      DECISION: [[[BUY]]]
      DECISION: [[[SELL]]]
      DECISION: [[[STRONG_BUY]]]
      DECISION: [[[STRONG_SELL]]]
  num_train_epochs: 1
  logging_steps: 1
  report_to: ["wandb"]
  run_name: "trading_r1_stage1_grpo"
