train_sft:
  mode: "hf"
  stage: 2
  train_path: "/scratch/10499/daiheng367/trading_r1/artifacts/datasets/sft_targets.jsonl"
  val_path: null
  output_dir: "/scratch/10499/daiheng367/trading_r1/artifacts/models/stage2_sft"

  # Warm-start Stage II SFT from the best-reward checkpoint selected during Stage I GRPO.
