train_sft:
  mode: "hf"   # hf | mock
  stage: 1
  train_path: "scratch/10499/daiheng367/trading_r1/artifacts/datasets/sft_targets.jsonl"
  val_path: null
  output_dir: "scratch/10499/daiheng367/trading_r1/artifacts/models/stage1_sft"

  model_name: "Qwen/Qwen3-4B-Instruct"
  max_seq_len: 32768
  num_train_epochs: 1
  # Set to "latest" to continue from newest checkpoint in output_dir,
  # or an explicit path like ".../checkpoint-100".
  resume_from_checkpoint: null
  learning_rate: 2.0e-5
  batch_size: 1
  grad_accum: 8

  lora_r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  lora_target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "up_proj", "down_proj", "gate_proj"]

  deepspeed_config: null
